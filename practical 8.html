<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enhanced Image Gallery</title>
<style>
    /* General Styles */
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
    }

    header {
        text-align: center;
        padding: 20px;
        color: white;
        text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
    }

    /* Gallery Grid */
    .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        padding: 20px;
        width: 90%;
    }

    .image-card {
        position: relative;
        border-radius: 10px;
        overflow: hidden;
        cursor: pointer;
        transition: transform 0.3s, box-shadow 0.3s;
    }

    .image-card img {
        width: 100%;
        display: block;
        transition: transform 0.5s;
    }

    /* Hover Effect */
    .image-card:hover {
        transform: scale(1.05);
        box-shadow: 0 15px 25px rgba(0,0,0,0.3);
    }

    .image-card:hover img {
        transform: scale(1.1) rotate(2deg);
    }

    /* Overlay */
    .overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(45deg, rgba(255,0,150,0.4), rgba(0,204,255,0.4));
        opacity: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        font-size: 1.5rem;
        font-weight: bold;
        text-align: center;
        padding: 10px;
        transition: opacity 0.4s, background 0.4s;
    }

    .image-card:hover .overlay {
        opacity: 1;
        background: linear-gradient(45deg, rgba(255,0,150,0.6), rgba(0,204,255,0.6));
    }

    /* Different Backgrounds for each card (for fallback if image not loaded) */
    .image-card:nth-child(1) { background-color: #f6d365; }
    .image-card:nth-child(2) { background-color: #fda085; }
    .image-card:nth-child(3) { background-color: #a1c4fd; }
    .image-card:nth-child(4) { background-color: #c2e9fb; }
    .image-card:nth-child(5) { background-color: #d4fc79; }
    .image-card:nth-child(6) { background-color: #96e6a1; }
    .image-card:nth-child(7) { background-color: #84fab0; }
    .image-card:nth-child(8) { background-color: #8fd3f4; }

</style>
</head>
<body>

<header>
    <h1>Enhanced Image Gallery</h1>
</header>

<section class="gallery">
    <div class="image-card">
        <img src="https://images.unsplash.com/photo-1503023345310-bd7c1de61c7d?auto=format&fit=crop&w=500&q=60" alt="Mountain">
        <div class="overlay">Beautiful Mountain</div>
    </div>
    <div class="image-card">
        <img src="https://images.unsplash.com/photo-1523413651479-597eb2da0ad6?auto=format&fit=crop&w=500&q=60" alt="Beach">
        <div class="overlay">Sunny Beach</div>
    </div>
    <div class="image-card">
        <img src="https://images.unsplash.com/photo-1506748686214-e9df14d4d9d0?auto=format&fit=crop&w=500&q=60" alt="Forest">
        <div class="overlay">Green Forest</div>
    </div>
    <div class="image-card">
    <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=500&q=60" alt="Desert">
    <div class="overlay">Desert Landscape</div>
</div>
    <div class="image-card">
        <img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e?auto=format&fit=crop&w=500&q=60" alt="Lake">
        <div class="overlay">Serene Lake</div>
    </div>
    <div class="image-card">
        <img src="https://images.unsplash.com/photo-1465101162946-4377e57745c3?auto=format&fit=crop&w=500&q=60" alt="Flowers">
        <div class="overlay">Blooming Flowers</div>
    </div>
    <div class="image-card">
        <img src="https://images.unsplash.com/photo-1470770903676-69b98201ea1c?auto=format&fit=crop&w=500&q=60" alt="City">
        <div class="overlay">City Skyline</div>
    </div>
    <div class="image-card">
        <img src="https://images.unsplash.com/photo-1519985176271-adb1088fa94c?auto=format&fit=crop&w=500&q=60" alt="Snow">
        <div class="overlay">Snowy Mountains</div>
    </div>
</section>

</body>
</html>
