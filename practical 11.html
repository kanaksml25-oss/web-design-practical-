<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTML5 APIs Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        h2 {
            margin-top: 30px;
        }

        /* Drag and Drop */
        #dragBox {
            width: 120px;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            text-align: center;
            cursor: grab;
        }

        #dropBox {
            width: 200px;
            height: 120px;
            border: 2px dashed #333;
            margin-top: 15px;
            padding: 10px;
        }

        /* Storage */
        input {
            padding: 5px;
        }

        button {
            padding: 6px 10px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <h1>HTML5 APIs Demonstration</h1>

    <!-- Drag & Drop -->
    <h2>1. Drag and Drop API</h2>
    <div id="dragBox" draggable="true" ondragstart="drag(event)">
        Drag me
    </div>

    <div id="dropBox" ondrop="drop(event)" ondragover="allowDrop(event)">
        Drop here
    </div>

    <!-- Geolocation -->
    <h2>2. Geolocation API</h2>
    <button onclick="getLocation()">Get My Location</button>
    <p id="location"></p>

    <!-- Web Storage -->
    <h2>3. Web Storage API (localStorage)</h2>
    <input type="text" id="username" placeholder="Enter your name">
    <br>
    <button onclick="saveName()">Save Name</button>
    <button onclick="loadName()">Load Name</button>
    <p id="storedName"></p>

    <script>
        /* Drag & Drop */
        function allowDrop(event) {
            event.preventDefault();
        }

        function drag(event) {
            event.dataTransfer.setData("text", event.target.id);
        }

        function drop(event) {
            event.preventDefault();
            let data = event.dataTransfer.getData("text");
            event.target.appendChild(document.getElementById(data));
        }

        /* Geolocation */
        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(showPosition);
            } else {
                document.getElementById("location").innerHTML =
                    "Geolocation is not supported by this browser.";
            }
        }

        function showPosition(position) {
            document.getElementById("location").innerHTML =
                "Latitude: " + position.coords.latitude +
                "<br>Longitude: " + position.coords.longitude;
        }

        /* Web Storage */
        function saveName() {
            let name = document.getElementById("username").value;
            localStorage.setItem("userName", name);
            alert("Name saved in localStorage");
        }

        function loadName() {
            let storedName = localStorage.getItem("userName");
            document.getElementById("storedName").innerHTML =
                "Stored Name: " + storedName;
        }
    </script>

</body>
</html>
